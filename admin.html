<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - إضافة طلاب</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            animation: cardEntrance 0.5s ease-out;
        }
        .form-group {
            margin-bottom: 22px;
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 9px;
            font-weight: 700;
            color: #102a43;
            font-size: 0.95rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            background: #fff;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
        }
        .submit-btn {
            background: linear-gradient(135deg, #203a43 0%, #2c5364 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(32, 58, 67, 0.2);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(32, 58, 67, 0.3);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #2c5364;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: #3498db;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1><i class="fas fa-user-shield"></i> لوحة الإدارة السحابية</h1>
        <p class="subtitle">قم بتغذية قاعدة البيانات والتحكم في السجلات المباشرة</p>
    </header>

    <main class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة لشاشة العرض العامة</a>
        
        <div class="admin-container">
            <form id="addStudentForm">
                <div class="form-group">
                    <label>إسم الطالب ثلاثي أو رباعي *</label>
                    <input type="text" id="studentName" required placeholder="مثال: عمر أشرف السيد">
                </div>
                <div class="form-group">
                    <label>التخصص الأكاديمي أو الشعبة *</label>
                    <input type="text" id="studentMajor" required placeholder="مثال: هندسة البرمجيات">
                </div>
                <div class="form-group">
                    <label>رابط الصورة الشخصية المباشر (إن وجد)</label>
                    <input type="url" id="studentImage" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني المعتمد</label>
                    <input type="email" id="studentEmail" placeholder="name@domain.com">
                </div>
                <div class="form-group">
                    <label>رقم هاتف الطالب</label>
                    <input type="tel" id="studentPhone" placeholder="01xxxxxxxxx">
                </div>
                <div class="form-group">
                    <label>محل السكن / المدينة</label>
                    <input type="text" id="studentCity" placeholder="مثال: الجيزة">
                </div>
                <div class="form-group">
                    <label>التقدير التراكمي الحالي</label>
                    <select id="studentGrade">
                        <option value="امتياز">امتياز</option>
                        <option value="جيد جداً">جيد جداً</option>
                        <option value="جيد">جيد</option>
                        <option value="مقبول">مقبول</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn"><i class="fas fa-plus"></i> حفظ وبث السجل فوراً</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCk9l8XNO4y-6qnaOqKsfAKQPbaemOOHrU",
          authDomain: "students-d06e7.firebaseapp.com",
          projectId: "students-d06e7",
          storageBucket: "students-d06e7.firebasestorage.app",
          messagingSenderId: "932035308750",
          appId: "1:932035308750:web:781364ca90256bca80749f",
          measurementId: "G-6VBEFTCHVG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const studentData = {
                name: document.getElementById('studentName').value,
                major: document.getElementById('studentMajor').value,
                image: document.getElementById('studentImage').value,
                email: document.getElementById('studentEmail').value,
                phone: document.getElementById('studentPhone').value,
                city: document.getElementById('studentCity').value,
                grade: document.getElementById('studentGrade').value,
                timestamp: new Date()
            };

            try {
                await addDoc(collection(db, "students"), studentData);
                alert("تم حفظ الطالب بنجاح وظهر حالياً في شاشة العرض! 🚀");
                document.getElementById('addStudentForm').reset();
            } catch (error) {
                console.error(error);
                alert("حدث خطأ، يرجى مراجعة لوحة تحكم الفايربيز وقواعد الحماية.");
            }
        });
    </script>
</body>
</html>
